services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel-network

  nginx:
    image: nginx:1.25-alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-network

  db:
    image: postgres:14-alpine
    container_name: laravel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tcc_catalog
      POSTGRES_USER: tcc_user
      POSTGRES_PASSWORD: tcc_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcc_user -d tcc_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - laravel-network

volumes:
  pgdata:

networks:
  laravel-network:
    driver: bridge
